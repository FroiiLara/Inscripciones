<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Usuario</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="../static/css/styles.css">
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
<script defer src="{{ url_for('static', filename='app.js') }}"></script>

</head>

<body>

<div class="login-container">

<form class="login-form" action="/registro" method="POST">

<img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">

<h2>Registro de Usuario</h2>

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% for category, message in messages %}

<div class="{{ 'success-message' if category == 'success' else 'error-message' }}">
{{ message }}
</div>

{% endfor %}
{% endif %}
{% endwith %}

<!-- Matrícula -->
<div class="form-group">

<i class="fas fa-id-card icon"></i>

<input 
type="text"
name="matricula"
placeholder="Matrícula"
required
minlength="4"
maxlength="12"
inputmode="numeric"
pattern="[0-9]*"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
title="Solo números">

</div>

<!-- Nombre completo -->
<div class="form-group">

<i class="fas fa-user icon"></i>

<input
type="text"
name="usuario"
placeholder="Nombre completo"
required
minlength="5"
maxlength="80">

</div>

<!-- Email -->
<div class="form-group">

<i class="fas fa-envelope icon"></i>

<input
type="email"
name="email"
placeholder="Correo institucional"
required
pattern=".+@virtual\.utsc\.edu\.mx"
title="Debe ser correo institucional">

</div>

<!-- Contraseña -->
<div class="form-group password-group">

<i class="fas fa-lock icon"></i>

<input
type="password"
name="contrasena"
placeholder="Contraseña"
id="password"
required
minlength="8"
title="Debe tener mayúscula, minúscula, número y símbolo">

<span class="toggle-password" id="togglePassword">
<i class="fas fa-eye"></i>
</span>

</div>

<button type="submit" class="btn">Registrarse</button>

<div class="login-link">

<p>
¿Ya tienes cuenta?
<a href="/login" class="login-text">Inicia sesión aquí</a>
</p>

</div>

</form>

</div>

</body>
</html>
