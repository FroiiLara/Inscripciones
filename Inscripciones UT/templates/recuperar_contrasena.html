<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>

    <link rel="stylesheet" href="../static/css/contrasena.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/logo.png') }}">
</head>
<body>

    <div class="container">
        <div class="card">

            <h2>Recuperar Contraseña</h2>
            <p class="subtitle">
                Ingresa tu correo electrónico y te enviaremos instrucciones
            </p>

            {% with messages = get_flashed_messages(category_filter=['success', 'error']) %}
                {% if messages %}
                    <div class="flash-message">
                        {{ messages[0] }}
                    </div>
                {% endif %}
            {% endwith %}
            

            <form action="{{ url_for('recuperar_contrasena') }}" method="POST">

                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" name="email" 
                        placeholder="Correo institucional @utsc.edu.mx" 
                        required pattern=".+@utsc\.edu\.mx"
                        title="Ingresa el correo con el que te registraste (@utsc.edu.mx)">
                </div>

                <button type="submit" class="btn-primary">
                    Enviar instrucciones
                </button>

            </form>

            <a href="/login" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver al login
            </a>

        </div>
    </div>

</body>
</html>
